services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scheduler}
      POSTGRES_USER: ${POSTGRES_USER:-scheduler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scheduler-local-only}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports: ["5432:5432"]
    volumes: ["scheduler-data:/var/lib/postgresql/data"]
  app:
    build: .
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-scheduler}
      DB_USER: ${POSTGRES_USER:-scheduler}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-scheduler-local-only}
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 3s
      retries: 20
    ports: ["8080:8080"]
volumes: { scheduler-data: {} }
